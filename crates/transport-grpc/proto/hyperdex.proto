syntax = "proto3";

package hyperdex.v1;

service HyperdexAdmin {
  rpc CreateSpace(CreateSpaceRequest) returns (CreateSpaceResponse);
}

message CreateSpaceRequest {
  string schema_dsl = 1;
}

message CreateSpaceResponse {}

service HyperdexClient {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
}

message PutRequest {
  string space = 1;
  bytes key = 2;
  repeated Attribute attributes = 3;
}

message PutResponse {}

message GetRequest {
  string space = 1;
  bytes key = 2;
}

message GetResponse {
  bool found = 1;
  repeated Attribute attributes = 2;
}

message Attribute {
  string name = 1;
  Value value = 2;
}

message Value {
  oneof kind {
    bool bool_value = 1;
    sint64 int_value = 2;
    double float_value = 3;
    bytes bytes_value = 4;
    string string_value = 5;
    Null null_value = 6;
  }
}

message Null {}
