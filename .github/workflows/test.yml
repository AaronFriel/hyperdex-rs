name: Rust Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake libclang-dev pkg-config protobuf-compiler

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run workspace tests
        run: scripts/check-workspace-tests.sh
