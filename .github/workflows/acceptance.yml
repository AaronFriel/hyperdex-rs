name: Live Acceptance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quick-live-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake libclang-dev pkg-config protobuf-compiler

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run quick live acceptance verifier
        run: scripts/verify-live-acceptance.sh --ci
